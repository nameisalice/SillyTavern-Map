<div class="st-atlas inline-drawer" data-st-atlas="settings">
  <div class="inline-drawer-toggle inline-drawer-header st-atlas__settings-header">
    <b>Atlas</b>
    <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
  </div>
  <div class="inline-drawer-content st-atlas__settings-body">
    <div class="st-atlas__settings-row">
      <label for="st-atlas-enabled" class="st-atlas__settings-label">Enable Atlas</label>
      <input id="st-atlas-enabled" type="checkbox" class="st-atlas__checkbox" />
    </div>
    <div class="st-atlas__settings-row">
      <label for="st-atlas-open-mode" class="st-atlas__settings-label">Viewer mode</label>
      <select id="st-atlas-open-mode" class="st-atlas__select text_pole">
        <option value="floating">Floating</option>
        <option value="fullscreen">Fullscreen</option>
        <option value="docked">Docked</option>
      </select>
    </div>
    <div class="st-atlas__settings-row">
      <label for="st-atlas-logging-level" class="st-atlas__settings-label">Log level</label>
      <select id="st-atlas-logging-level" class="st-atlas__select text_pole">
        <option value="error">Error</option>
        <option value="warn">Warning</option>
        <option value="info">Info</option>
        <option value="debug">Debug</option>
      </select>
    </div>
  </div>
</div>
