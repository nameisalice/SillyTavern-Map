<div class="st-atlas__library" data-st-atlas="library">
  <div class="st-atlas__library-header">
    <b>Atlas Map Library</b>
    <span class="st-atlas__library-spacer"></span>
    <button
      type="button"
      class="st-atlas__library-btn menu_button menu_button_icon"
      data-st-atlas-library-action="create"
    >
      <i class="fa-solid fa-plus"></i><span>Create Map</span>
    </button>
    <button
      type="button"
      class="st-atlas__library-btn menu_button menu_button_icon"
      data-st-atlas-library-action="generate"
    >
      <i class="fa-solid fa-wand-magic-sparkles"></i><span>Generate Map</span>
    </button>
  </div>
  <div class="st-atlas__library-note">
    Maps are stored in this browser only. They do not sync to other devices.
  </div>
  <ul class="st-atlas__library-list" data-st-atlas="library-list"></ul>
</div>
